name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          - os: macos-latest
            deps: echo "No extra deps needed on macOS"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: ${{ matrix.deps }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install frontend dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit 2>&1 | grep -v "TS7016\|TS7026\|TS2503\|TS2686" | head -50 || true

      - name: Build frontend
        run: npx vite build

      - name: Rust format check
        run: cd src-tauri && cargo fmt --all -- --check

      - name: Rust lint
        run: cd src-tauri && cargo clippy --all-targets -- -D warnings

      - name: Rust build
        run: cd src-tauri && cargo build
